<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printing Legion | 404 - Object Not Found</title>
    <style>
        /* --- 1. PRELOADER --- */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1a1a1d !important; z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            visibility: visible; opacity: 1; transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #preloader.hidden { opacity: 0; visibility: hidden; }

        /* --- NEW 3D ROLLING CUBE --- */
        .cube-wrapper {
            width: 60px; height: 60px;
            perspective: 300px;
            margin-bottom: 40px;
        }
        .cube {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: cube-roll 3s infinite linear;
        }
        .cube-face {
            position: absolute; width: 60px; height: 60px;
            background: rgba(0, 123, 255, 0.1);
            border: 2px solid #007bff;
            box-shadow: inset 0 0 15px rgba(0, 123, 255, 0.5);
        }
        .front  { transform: rotateY(0deg) translateZ(30px); }
        .back   { transform: rotateY(180deg) translateZ(30px); }
        .right  { transform: rotateY(90deg) translateZ(30px); }
        .left   { transform: rotateY(-90deg) translateZ(30px); }
        .top    { transform: rotateX(90deg) translateZ(30px); }
        .bottom { transform: rotateX(-90deg) translateZ(30px); }

        @keyframes cube-roll {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            20% { transform: rotateX(90deg) rotateY(0deg); }
            40% { transform: rotateX(90deg) rotateY(90deg); }
            60% { transform: rotateX(180deg) rotateY(90deg); }
            80% { transform: rotateX(180deg) rotateY(180deg); }
            100% { transform: rotateX(270deg) rotateY(180deg); }
        }

        .loader-text {
            color: #007bff;
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: pulse-text 1.5s infinite;
        }
        @keyframes pulse-text {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* --- 2. PAGE STYLES (MATCHING INDEX) --- */
        body { 
            font-family: 'JetBrains Mono', 'Segoe UI', monospace; 
            margin: 0; 
            background-color: #000a1a;
            background-image: 
                linear-gradient(rgba(0, 100, 200, 0.05) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 100, 200, 0.05) 1px, transparent 1px),
                radial-gradient(circle at center, #0a1a33 0%, #000a1a 100%);
            background-size: 30px 30px, 30px 30px, auto;
            color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        
        .error-container {
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 60px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.03);
            border: 1px solid rgba(255, 50, 50, 0.3); /* Reddish tint for error */
            max-width: 600px; width: 90%;
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        body.loaded .error-container { opacity: 1; transform: translateY(0); }

        .error-code {
            font-size: 6rem; font-weight: bold; margin: 0; color: #ff3333;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
            letter-spacing: -5px;
        }

        .error-container h1 {
            margin-top: 0; font-size: 1.8rem; letter-spacing: 1px; color: #ffffff;
        }

        .error-container p {
            color: #cccccc; font-size: 1.1rem; margin-bottom: 30px; line-height: 1.6;
        }

        .status-info {
            display: flex; justify-content: space-between; font-size: 0.8rem;
            color: #ff3333; margin-top: 15px; margin-bottom: 30px;
            text-transform: uppercase; letter-spacing: 2px;
            border-top: 1px solid rgba(255, 51, 51, 0.2);
            border-bottom: 1px solid rgba(255, 51, 51, 0.2);
            padding: 10px 0;
        }

        .btn-home {
            display: inline-block; background: #007bff; color: white;
            padding: 12px 30px; border-radius: 8px; text-decoration: none;
            font-weight: bold; transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.4);
        }
        .btn-home:hover {
            background: #0056b3; transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 123, 255, 0.6);
        }

        /* --- COPYRIGHT (MATCHING INDEX) --- */
        .copyright {
            position: fixed; bottom: 20px; left: 0; width: 100%;
            text-align: center; font-size: 0.75rem; color: rgba(255, 255, 255, 0.4);
            z-index: 9999; opacity: 0; transition: opacity 0.8s ease;
            pointer-events: none;
        }
        body.loaded .copyright { opacity: 1; pointer-events: auto; }
        .copyright a { color: rgba(0, 123, 255, 0.7); text-decoration: none; }
        .copyright a:hover { color: #007bff; text-decoration: underline; }
    </style>
</head>
<body>
    <div id="preloader">
        <div class="cube-wrapper">
            <div class="cube">
                <div class="cube-face front"></div>
                <div class="cube-face back"></div>
                <div class="cube-face right"></div>
                <div class="cube-face left"></div>
                <div class="cube-face top"></div>
                <div class="cube-face bottom"></div>
            </div>
        </div>
        <div class="loader-text">Analyzing error...</div>
    </div>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1>G-Code Not Found</h1>
        <p>It seems like the model you are looking for has been removed from the print bed or the extruder lost its way.</p>
        
        <div class="status-info">
            <span>Error: M404</span>
            <span>Bed: Cooling</span>
            <span>Status: Halted</span>
        </div>

        <a href="matyas604.github.io" class="btn-home">Return to Home</a>
    </div>

    <p class="copyright">
        Made with ❤️ by <a href="https://github.com/Matyas604" target="_blank">@Matyas604</a>
    </p>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var preloader = document.getElementById('preloader');
            var body = document.body;

            setTimeout(function() {
                preloader.classList.add('hidden');
                body.classList.add('loaded');
                setTimeout(function() {
                    preloader.style.display = 'none';
                }, 500);
            }, 1500); // Slightly faster preloader for 404
        });
    </script>
</body>
</html>
