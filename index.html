<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Page Under Construction</title>
    <style>
        /* --- 1. PRELOADER --- */
        #preloader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1a1a1d !important; z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            visibility: visible; opacity: 1; transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #preloader.hidden { opacity: 0; visibility: hidden; }

        /* --- NEW 3D ROLLING CUBE --- */
        .cube-wrapper {
            width: 60px; height: 60px;
            perspective: 300px;
            margin-bottom: 40px;
        }
        .cube {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: cube-roll 3s infinite linear;
        }
        .cube-face {
            position: absolute; width: 60px; height: 60px;
            background: rgba(0, 123, 255, 0.1);
            border: 2px solid #007bff;
            box-shadow: inset 0 0 15px rgba(0, 123, 255, 0.5);
        }
        .front  { transform: rotateY(0deg) translateZ(30px); }
        .back   { transform: rotateY(180deg) translateZ(30px); }
        .right  { transform: rotateY(90deg) translateZ(30px); }
        .left   { transform: rotateY(-90deg) translateZ(30px); }
        .top    { transform: rotateX(90deg) translateZ(30px); }
        .bottom { transform: rotateX(-90deg) translateZ(30px); }

        @keyframes cube-roll {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            20% { transform: rotateX(90deg) rotateY(0deg); }
            40% { transform: rotateX(90deg) rotateY(90deg); }
            60% { transform: rotateX(180deg) rotateY(90deg); }
            80% { transform: rotateX(180deg) rotateY(180deg); }
            100% { transform: rotateX(270deg) rotateY(180deg); }
        }

        .loader-text {
            color: #007bff;
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            animation: pulse-text 1.5s infinite;
        }
        @keyframes pulse-text {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* --- 2. PAGE STYLES --- */
        body { 
            font-family: 'JetBrains Mono', 'Segoe UI', monospace; 
            margin: 0; 
            background-color: #000a1a;
            background-image: 
                linear-gradient(rgba(0, 100, 200, 0.05) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(0, 100, 200, 0.05) 1px, transparent 1px),
                radial-gradient(circle at center, #0a1a33 0%, #000a1a 100%);
            background-size: 30px 30px, 30px 30px, auto;
            color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }
        
        .construction-container {
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 60px; border-radius: 24px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.03);
            border: 1px solid rgba(0, 123, 255, 0.2);
            max-width: 600px; width: 90%;
            opacity: 0; transform: translateY(20px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        body.loaded .construction-container { opacity: 1; transform: translateY(0); }

        .construction-container h1 {
            margin-top: 0; font-size: 2.2rem; letter-spacing: 1px; color: #ffffff;
        }

        .construction-container p {
            color: #cccccc; font-size: 1.1rem; margin-bottom: 30px; line-height: 1.6;
        }

        /* --- 3. PRINT ANIMATION --- */
        .printing-animation {
            width: 100%; height: 12px; background: rgba(0,0,0,0.3);
            border-radius: 10px; position: relative; margin-bottom: 20px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.8);
        }

        .printing-progress {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #007bff, #00d2ff);
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.6);
            border-radius: 10px;
            animation: print-progress 5s infinite ease-in-out;
            position: relative;
        }

        .printing-nozzle {
            position: absolute; top: -10px; right: -10px; width: 20px; height: 20px;
            background: #00d2ff; border-radius: 50%;
            box-shadow: 0 0 20px #007bff, 0 0 40px #007bff;
            animation: nozzle-pulse 1s infinite alternate;
        }

        .status-info {
            display: flex; justify-content: space-between; font-size: 0.8rem;
            color: #007bff; margin-top: 15px; margin-bottom: 20px;
            text-transform: uppercase; letter-spacing: 2px;            
            border-top: 1px solid rgba(0, 123, 255, 0.2); /* Modrá čára nahoře */
            border-bottom: 1px solid rgba(0, 123, 255, 0.2); /* Modrá čára dole */
            padding: 10px 0; /* Odsazení pro čáry */
        }

        @keyframes print-progress {
            0% { width: 5%; } 50% { width: 95%; } 100% { width: 5%; }
        }

        @keyframes nozzle-pulse {
            from { transform: scale(0.9); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; }
        }

        /* Language Switcher */
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 100000;
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }
        body.loaded .lang-switch {
            opacity: 1;
            pointer-events: auto;
        }
        .lang-switch a {
            color: #007bff;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid #007bff;
            padding: 5px 12px;
            border-radius: 6px;
            transition: 0.3s;
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            font-weight: bold;
        }
        .lang-switch a:hover {
            background: #007bff;
            color: white;
        }
        /* Copyright Styles */
        .copyright {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.75rem; /* Slightly smaller */
            color: rgba(255, 255, 255, 0.4); /* More subtle color */
            z-index: 9999; /* Below preloader, above main content */
            opacity: 0; /* Hidden initially */
            transition: opacity 0.8s ease;
            pointer-events: none; /* Not clickable until visible */
        }
        body.loaded .copyright {
            opacity: 1;
            pointer-events: auto;
        }
        .copyright a {
            color: rgba(0, 123, 255, 0.7); /* Subtle blue link */
            text-decoration: none;
        }
        .copyright a:hover {
            color: #007bff; /* Brighter blue on hover */
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="cs">CZ</a>
    </div>

    <div id="preloader">
        <div class="cube-wrapper">
            <div class="cube">
                <div class="cube-face front"></div>
                <div class="cube-face back"></div>
                <div class="cube-face right"></div>
                <div class="cube-face left"></div>
                <div class="cube-face top"></div>
                <div class="cube-face bottom"></div>
            </div>
        </div>
        <div class="loader-text">Initializing Print...</div>
    </div>

    <div class="construction-container">
        <h1>Site is printing...</h1>
        <p>This page is currently being printed layer by layer. <br>Please come back later when the print job is complete.</p>
        
        <div class="status-info">
            <span>Temp: 215°C</span>
            <span>Layer: 42/100</span>
            <span>Speed: 60mm/s</span>
        </div>

        <div class="printing-animation">
            <div class="printing-progress">
                <div class="printing-nozzle"></div>
            </div>
        </div>
    </div>

    <p class="copyright">
        Made with ❤️ by <a href="https://github.com/Matyas604" target="_blank">@Matyas604</a>
    </p>

    <style>
        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 600px) {
            .construction-container {
                padding: 40px 20px;
                width: 92%;
            }
            .construction-container h1 {
                font-size: 1.6rem;
            }
            .construction-container p {
                font-size: 1rem;
            }
            .status-info {
                flex-direction: column;
                gap: 8px;
                align-items: center;
            }
            .lang-switch {
                top: 15px;
                right: 15px;
            }
            .lang-switch a {
                padding: 4px 10px;
                font-size: 0.8rem;
            }
        }
    </style>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var preloader = document.getElementById('preloader');
            var body = document.body;

            setTimeout(function() {
                preloader.classList.add('hidden');
                body.classList.add('loaded');
                setTimeout(function() {
                    preloader.style.display = 'none';
                }, 500);
            }, 2000);
        });
    </script>
</body>
</html>
