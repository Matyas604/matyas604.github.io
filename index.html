<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printing Legion | My Dashboard</title>
    <style>
        /* 1. KRITICKÉ STYLY PRO PRELOADER - Musí být první */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1d !important; /* Vynutíme černou barvu */
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            visibility: visible;
            opacity: 1;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #preloader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-cube {
            width: 50px;
            height: 50px;
            background-color: #007bff;
            animation: cube-spin 2s infinite ease-in-out;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.5);
        }

        .loader-text {
            color: white;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 3px;
            font-weight: bold;
        }

        @keyframes cube-spin {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.2) rotate(180deg); border-radius: 50%; }
            100% { transform: scale(1) rotate(360deg); }
        }

        /* 2. STYLY ZBYTKU WEBU */
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            background-color: #f0f2f5; 
        }

        /* Obsah webu zpočátku neřešíme, preloader ho překryje */
        header { background: #24292e; color: white; padding: 2rem 1rem; text-align: center; }
        nav { background: #343a40; display: flex; justify-content: center; padding: 10px; position: sticky; top: 0; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        .container { max-width: 900px; margin: 30px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        
        .status-badge { background: #28a745; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(40, 167, 69, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(40, 167, 69, 0); }
        }
        
        .btn { display: inline-block; background: #007bff; color: white; padding: 10px 20px; border-radius: 6px; text-decoration: none; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-cube"></div>
        <div class="loader-text">PRINTING LEGION</div>
    </div>

    <header>
        <h1>Printing Legion 🚀</h1>
        <p>3D tisková farma & Hackclub Lab</p>
    </header>

    <nav>
        <a href="index.html">Domů</a>
        <a href="sklad.html">Sklad Filamentu</a>
        <a href="objednavka.html">Objednat Tisk</a>
        <a href="recenze.html">Recenze</a>
    </nav>
    
    <div class="container">
        <h2>Dashboard <span class="status-badge">Systém Online</span></h2>
        <p>Vítej v řídícím centru <strong>Printing Legion</strong>.</p>
        <a href="objednavka.html" class="btn">Vytvořit novou objednávku</a>
    </div>

    <script>
        // Použijeme DOMContentLoaded, což je rychlejší než 'load'
        document.addEventListener('DOMContentLoaded', function() {
            var preloader = document.getElementById('preloader');
            
            // Počkáme 2 sekundy, aby si uživatel užil animaci
            setTimeout(function() {
                preloader.classList.add('hidden');
                
                // Po skončení animace zmizení (0.5s) preloader úplně odstraníme
                setTimeout(function() {
                    preloader.style.display = 'none';
                }, 500);
            }, 2000);
        });
    </script>

</body>
</html>
